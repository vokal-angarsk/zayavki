<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сбор заявок | Свяжитесь с нами</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 32px 28px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { font-size: 1.8rem; margin-bottom: 8px; color: #1e3c72; text-align: center; }
        .subtitle { text-align: center; color: #4a5568; margin-bottom: 24px; }
        iframe { width: 100%; border: none; height: 550px; border-radius: 20px; }
        hr { margin: 24px 0 16px; border: none; border-top: 1px solid #e2e8f0; }
        .contact-title { text-align: center; margin-bottom: 12px; color: #2d3748; font-weight: 500; }
        .contact-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn-phone, .btn-email {
            display: inline-block; padding: 10px 24px; border-radius: 40px; text-decoration: none;
            background: #ecf0f1; color: #2c3e50; font-weight: 500; transition: 0.2s;
        }
        .btn-phone:hover, .btn-email:hover { background: #d0d7de; transform: translateY(-2px); }
        @media (max-width: 480px) { .card { padding: 24px 20px; } iframe { height: 500px; } }
    </style>
</head>
<body>
<div class="card">
    <h1>Оставить заявку</h1>
    <div class="subtitle">Заполните форму — мы свяжемся с вами в течение дня</div>

    <iframe src="https://forms.yandex.ru/u/69e2246e1f1eb5212ee31275/?iframe=1" frameborder="0" style="overflow:hidden; width:100%; height:550px;"></iframe>

    <hr>
    <div class="contact-title">Свяжитесь с нами напрямую:</div>
    <div class="contact-links">
        <a href="tel:+79246287784" class="btn-phone">📞 Позвонить</a>
        <a href="mailto:vokal-angarsk@mail.ru" class="btn-email">✉️ Написать письмо</a>
    </div>
<hr>
    <div style="text-align: center; font-size: 13px; color: #666; margin-top: 30px;">
        <a href="privacy.html" target="_blank" style="color: #2a5298;">Политика конфиденциальности</a> &nbsp;|&nbsp;
        <a href="consent.html" target="_blank" style="color: #2a5298;">Согласие на обработку ПД</a>
    </div>
</body>
</html>
